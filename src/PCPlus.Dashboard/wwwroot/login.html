<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PC Plus Computing Endpoint Protection</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f0f23;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle grid pattern overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #1a1a3e;
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.3),
                0 0 80px rgba(59, 130, 246, 0.05);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .shield-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            display: block;
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .login-header p {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f23;
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input::placeholder {
            color: #475569;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-signin {
            width: 100%;
            padding: 13px 24px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn-signin:hover {
            background: #2563eb;
        }

        .btn-signin:active {
            transform: scale(0.98);
        }

        .btn-signin:disabled {
            background: #1e40af;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message.visible {
            display: block;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <polyline points="9 12 11 14 15 10"/>
                </svg>
                <h1>PC Plus Computing</h1>
                <p>Endpoint Protection</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-signin" id="btn-signin">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        (function () {
            var form = document.getElementById('login-form');
            var errorEl = document.getElementById('error-message');
            var btnSignin = document.getElementById('btn-signin');

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.classList.add('visible');
            }

            function hideError() {
                errorEl.classList.remove('visible');
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                hideError();

                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value;

                if (!username || !password) {
                    showError('Please enter both username and password.');
                    return;
                }

                btnSignin.disabled = true;
                btnSignin.textContent = 'Signing in\u2026';

                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data && data.ok === true) {
                        window.location.href = '/';
                    } else {
                        showError(data.message || 'Invalid username or password.');
                    }
                })
                .catch(function () {
                    showError('Unable to reach the server. Please try again.');
                })
                .finally(function () {
                    btnSignin.disabled = false;
                    btnSignin.textContent = 'Sign In';
                });
            });
        })();
    </script>
</body>
</html>
