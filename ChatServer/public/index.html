<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Plus Computing — Support Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0a0e17;--bg-panel:#111827;--bg-card:#1a2236;--bg-hover:#1e293b;
  --border:#1e2d4a;--border-active:#0078d4;
  --text-primary:#e2e8f0;--text-secondary:#8899b4;--text-muted:#4a5c7a;
  --accent:#0078d4;--accent-glow:rgba(0,120,212,.15);--accent-bright:#3b9eff;
  --green:#22c55e;--green-dim:rgba(34,197,94,.15);
  --red:#ef4444;--red-dim:rgba(239,68,68,.12);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.12);
  --purple:#a855f7;
  --font-mono:'JetBrains Mono',monospace;--font-body:'DM Sans',sans-serif;
  --radius:6px;--radius-lg:10px;
  --sidebar-w:320px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:var(--bg-deep);color:var(--text-primary);display:flex;flex-direction:column}

/* ─── TOP BAR ─── */
.topbar{
  height:48px;display:flex;align-items:center;gap:16px;padding:0 20px;
  background:var(--bg-panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{
  width:28px;height:28px;border-radius:6px;background:var(--accent);
  display:grid;place-items:center;font:700 11px/1 var(--font-mono);color:#fff;letter-spacing:-.5px;
}
.topbar-title{font:600 13px/1 var(--font-mono);color:var(--text-primary);letter-spacing:.5px;text-transform:uppercase}
.topbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.topbar-status{display:flex;align-items:center;gap:6px;font:500 11px/1 var(--font-mono);color:var(--text-secondary)}
.topbar-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-stat{font:500 11px/1 var(--font-mono);color:var(--text-muted)}
.topbar-stat strong{color:var(--text-secondary);font-weight:600}

/* ─── TABS ─── */
.tab-bar{
  display:flex;gap:0;background:var(--bg-panel);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 20px;
}
.tab-btn{
  padding:10px 20px;font:500 12px/1 var(--font-mono);color:var(--text-muted);
  background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;
  transition:all .2s;text-transform:uppercase;letter-spacing:.5px;position:relative;
}
.tab-btn:hover{color:var(--text-secondary)}
.tab-btn.active{color:var(--accent-bright);border-bottom-color:var(--accent)}
.tab-btn .badge{
  position:absolute;top:6px;right:4px;min-width:16px;height:16px;border-radius:8px;
  background:var(--red);color:#fff;font:700 9px/16px var(--font-mono);text-align:center;padding:0 4px;
  display:none;
}
.tab-btn .badge.show{display:block}

/* ─── MAIN LAYOUT ─── */
.main{display:flex;flex:1;overflow:hidden}
.tab-content{display:none;flex:1;overflow:hidden}
.tab-content.active{display:flex}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--bg-panel);
}
.sidebar-header{
  padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;
}
.sidebar-header input{
  flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:7px 10px;font:400 12px/1 var(--font-body);color:var(--text-primary);outline:none;
}
.sidebar-header input:focus{border-color:var(--accent)}
.sidebar-header input::placeholder{color:var(--text-muted)}
.client-list{flex:1;overflow-y:auto;padding:6px}
.client-list::-webkit-scrollbar{width:4px}
.client-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.client-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);
  cursor:pointer;transition:all .15s;position:relative;margin-bottom:2px;
}
.client-item:hover{background:var(--bg-hover)}
.client-item.active{background:var(--accent-glow);border:1px solid rgba(0,120,212,.3)}
.client-item:not(.active){border:1px solid transparent}
.client-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  transition:background .3s;
}
.client-dot.online{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.4)}
.client-dot.offline{background:var(--text-muted)}
.client-info{flex:1;min-width:0}
.client-name{font:600 12.5px/1.2 var(--font-body);color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font:400 10.5px/1.2 var(--font-mono);color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-unread{
  min-width:18px;height:18px;border-radius:9px;background:var(--accent);
  color:#fff;font:700 10px/18px var(--font-mono);text-align:center;padding:0 5px;flex-shrink:0;
  display:none;
}
.client-unread.show{display:block}
.client-time{font:400 10px/1 var(--font-mono);color:var(--text-muted);flex-shrink:0}

/* ─── CHAT AREA ─── */
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg-deep)}
.chat-placeholder{
  flex:1;display:grid;place-items:center;
}
.chat-placeholder-inner{text-align:center;opacity:.3}
.chat-placeholder-inner svg{width:64px;height:64px;stroke:var(--text-muted);stroke-width:1;fill:none;margin-bottom:12px}
.chat-placeholder-inner p{font:500 13px/1 var(--font-mono);color:var(--text-muted);letter-spacing:.5px}

.chat-header{
  padding:12px 20px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:14px;
  background:var(--bg-panel);
}
.chat-header.show{display:flex}
.chat-header-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chat-header-info{flex:1}
.chat-header-name{font:600 14px/1.2 var(--font-body);color:var(--text-primary)}
.chat-header-details{font:400 11px/1.4 var(--font-mono);color:var(--text-secondary);margin-top:3px}
.chat-header-actions{display:flex;gap:6px}
.chat-header-actions button{
  padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--bg-card);color:var(--text-secondary);font:500 11px/1 var(--font-mono);
  cursor:pointer;transition:all .15s;
}
.chat-header-actions button:hover{border-color:var(--accent);color:var(--accent-bright)}

.chat-messages{
  flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px;
}
.chat-messages::-webkit-scrollbar{width:5px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg-row{display:flex;gap:8px;max-width:72%}
.msg-row.from-client{align-self:flex-start}
.msg-row.from-support{align-self:flex-end;flex-direction:row-reverse}
.msg-bubble{
  padding:10px 14px;border-radius:12px;font:400 13px/1.5 var(--font-body);
  position:relative;word-wrap:break-word;
}
.msg-row.from-client .msg-bubble{
  background:var(--bg-card);color:var(--text-primary);
  border-bottom-left-radius:4px;
}
.msg-row.from-support .msg-bubble{
  background:var(--accent);color:#fff;
  border-bottom-right-radius:4px;
}
.msg-time{
  font:400 9.5px/1 var(--font-mono);color:var(--text-muted);margin-top:4px;
  padding:0 4px;
}
.msg-row.from-support .msg-time{text-align:right}
.msg-attachment{margin-top:6px}
.msg-attachment img{max-width:280px;max-height:200px;border-radius:6px;cursor:pointer;border:1px solid var(--border)}
.msg-attachment a{color:var(--accent-bright);font:500 12px/1 var(--font-mono);text-decoration:none}
.msg-row.from-support .msg-attachment a{color:rgba(255,255,255,.85)}

.msg-date-sep{
  text-align:center;padding:12px 0;font:500 10px/1 var(--font-mono);color:var(--text-muted);
  letter-spacing:1px;text-transform:uppercase;position:relative;
}
.msg-date-sep::before,.msg-date-sep::after{
  content:'';position:absolute;top:50%;width:calc(50% - 60px);height:1px;background:var(--border);
}
.msg-date-sep::before{left:0}
.msg-date-sep::after{right:0}

.typing-indicator{
  padding:6px 14px;font:italic 400 12px/1 var(--font-body);color:var(--text-muted);
  display:none;align-self:flex-start;
}
.typing-indicator.show{display:block}

.chat-input-area{
  padding:12px 16px;border-top:1px solid var(--border);display:none;gap:8px;align-items:flex-end;
  background:var(--bg-panel);
}
.chat-input-area.show{display:flex}
.chat-input-wrap{
  flex:1;display:flex;align-items:flex-end;gap:0;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:4px;transition:border-color .2s;
}
.chat-input-wrap:focus-within{border-color:var(--accent)}
.chat-input{
  flex:1;border:none;background:none;color:var(--text-primary);font:400 13px/1.4 var(--font-body);
  padding:8px 12px;outline:none;resize:none;max-height:120px;min-height:20px;
}
.chat-input::placeholder{color:var(--text-muted)}
.btn-attach{
  width:34px;height:34px;border-radius:var(--radius);border:none;background:none;
  color:var(--text-muted);cursor:pointer;display:grid;place-items:center;transition:color .15s;flex-shrink:0;
}
.btn-attach:hover{color:var(--accent-bright)}
.btn-send{
  width:38px;height:38px;border-radius:var(--radius-lg);border:none;background:var(--accent);
  color:#fff;cursor:pointer;display:grid;place-items:center;transition:all .15s;flex-shrink:0;
}
.btn-send:hover{background:var(--accent-bright);transform:scale(1.05)}
.btn-send:active{transform:scale(.95)}
.btn-send svg{width:18px;height:18px}

/* ─── TICKETS TAB ─── */
.tickets-panel{flex:1;overflow-y:auto;padding:20px}
.tickets-panel::-webkit-scrollbar{width:5px}
.tickets-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.tickets-grid{display:flex;flex-direction:column;gap:8px;max-width:900px;margin:0 auto}
.ticket-card{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px 20px;display:flex;align-items:center;gap:16px;transition:all .15s;
}
.ticket-card:hover{border-color:rgba(0,120,212,.3);background:var(--bg-card)}
.ticket-priority{
  width:4px;height:36px;border-radius:2px;flex-shrink:0;
}
.ticket-priority.low{background:var(--text-muted)}
.ticket-priority.normal{background:var(--accent)}
.ticket-priority.high{background:var(--orange)}
.ticket-priority.critical{background:var(--red)}
.ticket-body{flex:1;min-width:0}
.ticket-subject{font:600 13px/1.3 var(--font-body);color:var(--text-primary)}
.ticket-desc{font:400 11.5px/1.4 var(--font-body);color:var(--text-secondary);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-meta{display:flex;gap:12px;margin-top:6px}
.ticket-tag{
  padding:2px 8px;border-radius:4px;font:500 10px/1.4 var(--font-mono);letter-spacing:.3px;text-transform:uppercase;
}
.ticket-tag.open{background:var(--green-dim);color:var(--green)}
.ticket-tag.in_progress{background:var(--orange-dim);color:var(--orange)}
.ticket-tag.resolved{background:var(--accent-glow);color:var(--accent-bright)}
.ticket-tag.closed{background:rgba(100,116,139,.12);color:var(--text-muted)}
.ticket-date{font:400 10px/1.4 var(--font-mono);color:var(--text-muted)}
.ticket-actions{flex-shrink:0}
.ticket-actions select{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text-secondary);font:500 11px/1 var(--font-mono);padding:6px 8px;cursor:pointer;outline:none;
}
.ticket-actions select:focus{border-color:var(--accent)}

.tickets-empty{text-align:center;padding:60px 20px;color:var(--text-muted);font:500 13px/1 var(--font-mono)}

/* ─── AUTH OVERLAY ─── */
.auth-overlay{
  position:fixed;inset:0;z-index:100;background:var(--bg-deep);
  display:grid;place-items:center;
}
.auth-overlay.hidden{display:none}
.auth-box{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:40px;width:360px;text-align:center;
}
.auth-box-logo{
  width:48px;height:48px;border-radius:12px;background:var(--accent);
  display:grid;place-items:center;font:700 18px/1 var(--font-mono);color:#fff;margin:0 auto 20px;
}
.auth-box h2{font:600 16px/1 var(--font-body);color:var(--text-primary);margin-bottom:6px}
.auth-box p{font:400 12px/1.4 var(--font-body);color:var(--text-secondary);margin-bottom:24px}
.auth-conn-status{font:400 11px/1.4 'JetBrains Mono',monospace;color:var(--text-muted);margin-bottom:16px}
.auth-box input{
  width:100%;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text-primary);font:400 13px/1 var(--font-mono);
  outline:none;text-align:center;letter-spacing:1px;
}
.auth-box input:focus{border-color:var(--accent)}
.auth-box button{
  width:100%;margin-top:12px;padding:10px;background:var(--accent);border:none;
  border-radius:var(--radius);color:#fff;font:600 13px/1 var(--font-body);cursor:pointer;
  transition:all .15s;
}
.auth-box button:hover{background:var(--accent-bright)}
.auth-error{color:var(--red);font:500 11px/1 var(--font-mono);margin-top:10px;display:none}

/* ─── NOTIFICATION FLASH ─── */
.notif-flash{
  position:fixed;top:12px;right:12px;z-index:50;
  background:var(--bg-card);border:1px solid var(--accent);border-radius:var(--radius-lg);
  padding:12px 18px;display:flex;align-items:center;gap:10px;
  transform:translateX(calc(100% + 20px));transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.notif-flash.show{transform:translateX(0)}
.notif-flash-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.notif-flash-text{font:500 12px/1.3 var(--font-body);color:var(--text-primary)}
.notif-flash-sub{font:400 10px/1 var(--font-mono);color:var(--text-muted);margin-top:2px}

/* ─── IMAGE LIGHTBOX ─── */
.lightbox{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;
  place-items:center;cursor:zoom-out;
}
.lightbox.show{display:grid}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.6)}

/* ─── SCROLLBAR GLOBAL ─── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ─── EMPTY STATE ANIM ─── */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.chat-placeholder-inner svg{animation:float 3s ease-in-out infinite}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-box-logo">PC</div>
    <h2>Support Command</h2>
    <p>Enter your admin token to access the dashboard</p>
    <div class="auth-conn-status" id="authConnStatus"></div>
    <input type="password" id="authToken" placeholder="Admin token" autofocus>
    <button id="authBtn">Authenticate</button>
    <div class="auth-error" id="authError">Invalid token. Try again.</div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">PC</div>
    <span class="topbar-title">Support Command</span>
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-status">
    <span class="topbar-dot"></span>
    <span>CONNECTED</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-stat">Clients: <strong id="statClients">0</strong></span>
    <span class="topbar-stat">Online: <strong id="statOnline">0</strong></span>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="chat">Chat <span class="badge" id="chatBadge">0</span></button>
  <button class="tab-btn" data-tab="tickets">Tickets <span class="badge" id="ticketBadge">0</span></button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CHAT TAB -->
  <div class="tab-content active" id="tab-chat">
    <div class="sidebar">
      <div class="sidebar-header">
        <input type="text" id="clientSearch" placeholder="Search clients...">
      </div>
      <div class="client-list" id="clientList"></div>
    </div>

    <div class="chat-area">
      <div class="chat-header" id="chatHeader">
        <span class="chat-header-dot" id="chatHeaderDot"></span>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatHeaderName">—</div>
          <div class="chat-header-details" id="chatHeaderDetails">—</div>
        </div>
        <div class="chat-header-actions">
          <button onclick="createTicketForClient()">+ Ticket</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-placeholder">
          <div class="chat-placeholder-inner">
            <svg viewBox="0 0 64 64"><path d="M12 20h40v28a4 4 0 01-4 4H16a4 4 0 01-4-4V20z"/><path d="M8 16a4 4 0 014-4h40a4 4 0 014 4v4H8v-4z"/><circle cx="18" cy="32" r="2"/><circle cx="32" cy="32" r="2"/><circle cx="46" cy="32" r="2"/></svg>
            <p>Select a client to begin</p>
          </div>
        </div>
      </div>

      <div class="chat-input-area" id="chatInputArea">
        <div class="chat-input-wrap">
          <button class="btn-attach" title="Attach file" onclick="document.getElementById('fileInput').click()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
        </div>
        <button class="btn-send" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
        <input type="file" id="fileInput" hidden accept="image/*,.pdf,.txt,.log,.zip">
      </div>
    </div>
  </div>

  <!-- TICKETS TAB -->
  <div class="tab-content" id="tab-tickets">
    <div class="tickets-panel">
      <div class="tickets-grid" id="ticketsGrid">
        <div class="tickets-empty">No tickets yet</div>
      </div>
    </div>
  </div>

</div>

<!-- NOTIFICATION -->
<div class="notif-flash" id="notifFlash">
  <span class="notif-flash-dot"></span>
  <div>
    <div class="notif-flash-text" id="notifText">New message</div>
    <div class="notif-flash-sub" id="notifSub">from client</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src="">
</div>

<audio id="notifSound" preload="auto">

<script>
const WS_PROTO = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL = `${WS_PROTO}//${location.host}/ws`;
let ws = null;
let authenticated = false;
let selectedClientId = null;
let clients = {};
let unreadCounts = {};
let allTickets = [];

// ── AUTH ──
const authOverlay = document.getElementById('authOverlay');
const authToken = document.getElementById('authToken');
const authBtn = document.getElementById('authBtn');
const authError = document.getElementById('authError');

authBtn.onclick = () => attemptAuth();
authToken.addEventListener('keydown', e => { if (e.key === 'Enter') attemptAuth(); });

function attemptAuth() {
  const token = authToken.value.trim();
  if (!token) return;
  authBtn.textContent = 'Connecting...';
  authBtn.disabled = true;
  connectWebSocket(token);
}

// ── WEBSOCKET ──
function connectWebSocket(token) {
  try {
    ws = new WebSocket(WS_URL);
  } catch (e) {
    authError.textContent = 'Failed to connect to server.';
    authError.style.display = 'block';
    authBtn.textContent = 'Authenticate';
    authBtn.disabled = false;
    return;
  }

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth_admin', token }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    if (authenticated) {
      document.querySelector('.topbar-status span:last-child').textContent = 'RECONNECTING...';
      setTimeout(() => connectWebSocket(token), 3000);
    } else {
      authBtn.textContent = 'Authenticate';
      authBtn.disabled = false;
    }
  };

  ws.onerror = () => {
    if (!authenticated) {
      authError.textContent = 'Connection failed. Check if the server is running.';
      authError.style.display = 'block';
      authBtn.textContent = 'Authenticate';
      authBtn.disabled = false;
    }
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'auth_ok':
      if (msg.role === 'admin') {
        authenticated = true;
        authOverlay.classList.add('hidden');
      }
      break;

    case 'auth_fail':
      authError.style.display = 'block';
      authToken.value = '';
      authToken.focus();
      break;

    case 'client_list':
      msg.clients.forEach(c => { clients[c.id] = c; });
      unreadCounts = msg.unreadCounts || {};
      renderClientList();
      updateStats();
      loadTickets();
      break;

    case 'client_online':
      if (clients[msg.clientId]) {
        clients[msg.clientId].online = 1;
      } else {
        clients[msg.clientId] = { id: msg.clientId, hostname: msg.hostname || 'Unknown', online: 1 };
      }
      renderClientList();
      updateStats();
      break;

    case 'client_offline':
      if (clients[msg.clientId]) {
        clients[msg.clientId].online = 0;
      }
      renderClientList();
      updateStats();
      break;

    case 'message':
      if (msg.sender === 'client') {
        if (msg.client_id !== selectedClientId) {
          unreadCounts[msg.client_id] = (unreadCounts[msg.client_id] || 0) + 1;
          renderClientList();
          updateChatBadge();
        }
        showNotification(clients[msg.client_id]?.hostname || 'Client', msg.message);
        playSound();
      }
      if (msg.client_id === selectedClientId) {
        appendMessage(msg);
        scrollToBottom();
        if (msg.sender === 'client') {
          ws.send(JSON.stringify({ type: 'mark_read', clientId: selectedClientId }));
        }
      }
      break;

    case 'chat_history':
      if (msg.clientId === selectedClientId) {
        if (msg.client) {
          clients[msg.clientId] = { ...clients[msg.clientId], ...msg.client };
          updateChatHeader();
        }
        renderMessages(msg.messages);
      }
      break;
  }
}

// ── CLIENT LIST ──
function renderClientList() {
  const list = document.getElementById('clientList');
  const search = document.getElementById('clientSearch').value.toLowerCase();
  const sorted = Object.values(clients).sort((a, b) => {
    if (a.online !== b.online) return b.online - a.online;
    return (b.last_seen || '').localeCompare(a.last_seen || '');
  });

  list.innerHTML = sorted
    .filter(c => !search || (c.hostname || '').toLowerCase().includes(search) || (c.ip_address || '').toLowerCase().includes(search))
    .map(c => {
      const unread = unreadCounts[c.id] || 0;
      const isActive = c.id === selectedClientId;
      return `
        <div class="client-item ${isActive ? 'active' : ''}" onclick="selectClient('${c.id}')">
          <span class="client-dot ${c.online ? 'online' : 'offline'}"></span>
          <div class="client-info">
            <div class="client-name">${esc(c.hostname || c.id.slice(0, 12))}</div>
            <div class="client-meta">${esc(c.ip_address || '')} · ${esc(c.username || '')}</div>
          </div>
          <span class="client-unread ${unread > 0 ? 'show' : ''}">${unread}</span>
        </div>`;
    }).join('');
}

document.getElementById('clientSearch').addEventListener('input', renderClientList);

function selectClient(id) {
  selectedClientId = id;
  unreadCounts[id] = 0;
  renderClientList();
  updateChatBadge();

  document.getElementById('chatHeader').classList.add('show');
  document.getElementById('chatInputArea').classList.add('show');
  document.getElementById('chatMessages').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font:500 12px var(--font-mono)">Loading messages...</div>';

  updateChatHeader();
  ws.send(JSON.stringify({ type: 'load_chat', clientId: id }));
  document.getElementById('chatInput').focus();
}

function updateChatHeader() {
  const c = clients[selectedClientId];
  if (!c) return;
  document.getElementById('chatHeaderName').textContent = c.hostname || c.id.slice(0, 12);
  document.getElementById('chatHeaderDetails').textContent =
    [c.ip_address, c.os_info, c.agent_id ? `Agent: ${c.agent_id.slice(0, 12)}...` : ''].filter(Boolean).join(' · ');
  const dot = document.getElementById('chatHeaderDot');
  dot.style.background = c.online ? 'var(--green)' : 'var(--text-muted)';
  dot.style.boxShadow = c.online ? '0 0 6px rgba(34,197,94,.4)' : 'none';
}

// ── MESSAGES ──
function renderMessages(messages) {
  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  let lastDate = '';
  messages.forEach(m => {
    const date = (m.created_at || '').split('T')[0] || (m.created_at || '').split(' ')[0];
    if (date && date !== lastDate) {
      lastDate = date;
      const sep = document.createElement('div');
      sep.className = 'msg-date-sep';
      sep.textContent = formatDate(date);
      container.appendChild(sep);
    }
    appendMessage(m, container);
  });
  scrollToBottom();
}

function appendMessage(m, container) {
  container = container || document.getElementById('chatMessages');
  // Remove placeholder if present
  const ph = container.querySelector('.chat-placeholder');
  if (ph) ph.remove();

  const row = document.createElement('div');
  row.className = `msg-row from-${m.sender}`;

  let attachHtml = '';
  if (m.attachment) {
    const isImage = /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(m.attachment);
    if (isImage) {
      attachHtml = `<div class="msg-attachment"><img src="/uploads/${esc(m.attachment)}" onclick="openLightbox('/uploads/${esc(m.attachment)}')" alt="attachment"></div>`;
    } else {
      attachHtml = `<div class="msg-attachment"><a href="/uploads/${esc(m.attachment)}" target="_blank">📎 ${esc(m.attachment_name || m.attachment)}</a></div>`;
    }
  }

  const time = (m.created_at || '').split(' ')[1] || (m.created_at || '').split('T')[1] || '';
  row.innerHTML = `
    <div>
      <div class="msg-bubble">${esc(m.message || '')}${attachHtml}</div>
      <div class="msg-time">${time.slice(0, 5)}</div>
    </div>`;
  container.appendChild(row);
}

function scrollToBottom() {
  const el = document.getElementById('chatMessages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

// ── SEND MESSAGE ──
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const fileInput = document.getElementById('fileInput');

sendBtn.onclick = sendMessage;
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || !selectedClientId) return;
  ws.send(JSON.stringify({ type: 'message', clientId: selectedClientId, text }));
  chatInput.value = '';
  chatInput.style.height = 'auto';
}

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file || !selectedClientId) return;

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.filename) {
      ws.send(JSON.stringify({
        type: 'message',
        clientId: selectedClientId,
        text: '',
        attachment: data.filename,
        attachmentName: data.originalName
      }));
    }
  } catch (err) {
    console.error('Upload failed:', err);
  }
  fileInput.value = '';
});

// ── TICKETS ──
async function loadTickets() {
  try {
    const resp = await fetch('/api/tickets');
    allTickets = await resp.json();
    renderTickets();
  } catch (e) {}
}

function renderTickets() {
  const grid = document.getElementById('ticketsGrid');
  if (!allTickets.length) {
    grid.innerHTML = '<div class="tickets-empty">No tickets yet</div>';
    return;
  }
  grid.innerHTML = allTickets.map(t => `
    <div class="ticket-card">
      <div class="ticket-priority ${t.priority}"></div>
      <div class="ticket-body">
        <div class="ticket-subject">#${t.id} — ${esc(t.subject)}</div>
        <div class="ticket-desc">${esc(t.description || '')}</div>
        <div class="ticket-meta">
          <span class="ticket-tag ${t.status}">${t.status.replace('_', ' ')}</span>
          <span class="ticket-date">${esc(t.created_at || '')}</span>
          <span class="ticket-date">${esc((clients[t.client_id] || {}).hostname || t.client_id?.slice(0, 8) || '')}</span>
        </div>
      </div>
      <div class="ticket-actions">
        <select onchange="updateTicketStatus(${t.id}, this.value)">
          ${['open','in_progress','resolved','closed'].map(s =>
            `<option value="${s}" ${s === t.status ? 'selected' : ''}>${s.replace('_',' ')}</option>`
          ).join('')}
        </select>
      </div>
    </div>
  `).join('');

  const openCount = allTickets.filter(t => t.status === 'open' || t.status === 'in_progress').length;
  const badge = document.getElementById('ticketBadge');
  badge.textContent = openCount;
  badge.classList.toggle('show', openCount > 0);
}

async function updateTicketStatus(id, status) {
  await fetch(`/api/tickets/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  loadTickets();
}

function createTicketForClient() {
  if (!selectedClientId) return;
  const subject = prompt('Ticket subject:');
  if (!subject) return;
  const desc = prompt('Description (optional):') || '';
  fetch('/api/tickets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ clientId: selectedClientId, subject, description: desc })
  }).then(() => loadTickets());
}

// ── TABS ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    if (btn.dataset.tab === 'tickets') loadTickets();
  });
});

// ── NOTIFICATIONS ──
function showNotification(hostname, text) {
  const el = document.getElementById('notifFlash');
  document.getElementById('notifText').textContent = (text || '').slice(0, 60) || 'New attachment';
  document.getElementById('notifSub').textContent = `from ${hostname}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);

  // Browser notification
  if (Notification.permission === 'granted') {
    new Notification(`${hostname}`, { body: text || 'New message', icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%230078D4"/><text x="16" y="22" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">PC</text></svg>' });
  }
}

function playSound() {
  try { document.getElementById('notifSound').play().catch(() => {}); } catch (e) {}
}

function updateChatBadge() {
  const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
  const badge = document.getElementById('chatBadge');
  badge.textContent = total;
  badge.classList.toggle('show', total > 0);
  document.title = total > 0 ? `(${total}) PC Plus Support` : 'PC Plus Computing — Support Command';
}

function updateStats() {
  const all = Object.values(clients);
  document.getElementById('statClients').textContent = all.length;
  document.getElementById('statOnline').textContent = all.filter(c => c.online).length;
}

// ── LIGHTBOX ──
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}

// ── UTILS ──
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDate(d) {
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (d === today) return 'Today';
  if (d === yesterday) return 'Yesterday';
  return d;
}

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
</script>
