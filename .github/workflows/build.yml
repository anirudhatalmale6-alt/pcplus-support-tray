name: Build Windows Tray App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore SupportTray/SupportTray.csproj

    - name: Build
      run: dotnet publish SupportTray/SupportTray.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Copy installer scripts
      run: |
        copy SupportTray\install.bat publish\
        copy SupportTray\uninstall.bat publish\

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PCPlusSupportTray-win-x64
        path: publish/
        retention-days: 90

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: PC Plus Support Tray v1.0.${{ github.run_number }}
        files: |
          publish/PCPlusSupportTray.exe
          publish/install.bat
          publish/uninstall.bat
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
